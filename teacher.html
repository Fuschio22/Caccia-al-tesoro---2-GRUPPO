<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
.dashboard{background:white;padding:30px;border-radius:10px}
header{display:flex;justify-content:space-between;margin-bottom:20px}
.btn-reset{background:#ff4d4f;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-size:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
</style>
</head>
<body>
<div class="dashboard">
    <header>
        <h1>📊 Dashboard Docente</h1>
        <button class="btn-reset" onclick="clearData()">🗑️ Reset Dati</button>
    </header>
    <table id="dataTable"><thead><tr><th>Ora</th><th>Squadra</th><th>Risposta</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDYP-ylPtgkLAOreahgQZhG8VKuhpkp4Ro",
    authDomain: "caccia-al-tesoro---2-gruppo.firebaseapp.com",
    projectId: "caccia-al-tesoro---2-gruppo",
    storageBucket: "caccia-al-tesoro---2-gruppo.firebasestorage.app",
    messagingSenderId: "690362723053",
    appId: "1:690362723053:web:e46ea14fa18daf44957ae4",
    databaseURL: "https://caccia-al-tesoro---2-gruppo-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function clearData() {
    if(confirm("Cancellare tutti i dati?")) {
        db.ref('classroom').remove().then(()=>alert("Dati cancellati!"));
    }
}

db.ref('classroom/events').on('value', snap=>{
    const data = snap.val();
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    if(data) {
        Object.values(data).reverse().forEach(e=>{
            tbody.innerHTML += `<tr><td>${new Date(e.timestamp).toLocaleTimeString()}</td><td>${e.teamName}</td><td>${e.risposta||'-'}</td></tr>`;
        });
    }
});
</script>
</body>
</html>
